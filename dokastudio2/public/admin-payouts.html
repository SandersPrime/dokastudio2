<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DokaStudio — Admin payouts</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { padding: 24px; }
        .page { max-width: 1100px; margin: 0 auto; }
        .payout-card { border: 1px solid rgba(255,255,255,.08); border-radius: 12px; background: rgba(255,255,255,.035); padding: 14px; margin-bottom: 14px; }
        .table-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; align-items: center; }
        .status-box { display: none; padding: 12px 14px; border-radius: 12px; margin: 12px 0; }
        .status-box.success { background: rgba(34,197,94,.14); border: 1px solid rgba(34,197,94,.25); }
        .status-box.error { background: rgba(239,68,68,.14); border: 1px solid rgba(239,68,68,.25); }
        .empty-state { padding: 24px; opacity: .72; }
        @media (max-width: 800px) { .table-row { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="/css/ui-modernization.css">
</head>
<body>
<main class="page">
    <div class="page-header">
        <div>
            <div class="page-kicker">Admin</div>
            <h1>Admin payouts</h1>
            <p class="text-secondary">Approve, reject и mark paid для заявок авторов.</p>
        </div>
        <a class="btn btn-outline" href="/">На главную</a>
    </div>
    <div id="earningsStatus" class="status-box"></div>
    <section id="adminPayoutList" class="mt-4">
        <div class="empty-state">Загрузка...</div>
    </section>
</main>
<script src="/js/api.js"></script>
<script src="/js/earnings.js"></script>
</body>
</html>
