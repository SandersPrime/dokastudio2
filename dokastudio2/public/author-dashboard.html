<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DokaStudio — Кабинет автора</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { padding: 24px; }
        .page { max-width: 1180px; margin: 0 auto; }
        .market-card { border: 1px solid rgba(255,255,255,.08); border-radius: 12px; background: rgba(255,255,255,.035); padding: 16px; margin-bottom: 14px; }
        .market-row, .market-actions { display: flex; gap: 10px; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .publish-form { display: grid; grid-template-columns: repeat(5, 1fr) auto; gap: 8px; margin-top: 14px; }
        .status-box { display: none; padding: 12px 14px; border-radius: 12px; margin: 12px 0; }
        .status-box.success { background: rgba(34,197,94,.14); border: 1px solid rgba(34,197,94,.25); }
        .status-box.error { background: rgba(239,68,68,.14); border: 1px solid rgba(239,68,68,.25); }
        .empty-state { padding: 24px; opacity: .72; }
        @media (max-width: 1000px) { .publish-form { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="/css/ui-modernization.css">
</head>
<body>
<main class="page">
    <div class="page-header">
        <div>
            <div class="page-kicker">Автор</div>
            <h1>Кабинет автора</h1>
            <p class="text-secondary">Отправляйте свои квизы на модерацию Marketplace.</p>
        </div>
        <a class="btn btn-outline" href="/marketplace.html">Marketplace</a>
    </div>
    <div id="marketStatus" class="status-box"></div>
    <section id="authorQuizList" class="mt-4">
        <div class="empty-state">Загрузка...</div>
    </section>
</main>
<script src="/js/api.js"></script>
<script src="/js/marketplace.js"></script>
</body>
</html>
