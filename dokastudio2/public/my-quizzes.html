<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DokaStudio — Мои квизы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/ui-modernization.css">
    <style>
        body {
            padding: 24px;
        }

        .library-page {
            max-width: 1280px;
            margin: 0 auto;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin: 20px 0 24px;
        }

        .library-header h1 {
            margin-bottom: 8px;
        }

        .library-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .library-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .library-stat {
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 14px 16px;
            background: var(--bg-card);
        }

        .library-stat strong {
            display: block;
            font-size: 1.6rem;
            line-height: 1.1;
        }

        .library-toolbar {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) 180px auto;
            gap: 12px;
            align-items: end;
            margin: 0 0 18px;
        }

        .library-list {
            display: grid;
            gap: 12px;
        }

        .library-card {
            display: grid;
            grid-template-columns: 96px minmax(0, 1fr) auto;
            gap: 16px;
            align-items: stretch;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            background: var(--bg-card);
            padding: 14px;
        }

        .library-cover {
            border-radius: 8px;
            overflow: hidden;
            min-height: 86px;
            background: linear-gradient(135deg, rgba(34, 197, 94, .18), rgba(14, 165, 233, .18));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-weight: 700;
        }

        .library-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .library-main h3 {
            margin: 0 0 6px;
        }

        .library-description {
            margin: 0 0 10px;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .library-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .library-badge {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 5px 8px;
            font-size: .82rem;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, .03);
        }

        .library-badge.owned {
            color: #047857;
            border-color: rgba(4, 120, 87, .25);
            background: rgba(16, 185, 129, .10);
        }

        .library-badge.purchased {
            color: #1d4ed8;
            border-color: rgba(29, 78, 216, .22);
            background: rgba(59, 130, 246, .10);
        }

        .library-card-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
            min-width: 150px;
        }

        .library-empty {
            border: 1px dashed var(--border-light);
            border-radius: 8px;
            padding: 36px 20px;
            text-align: center;
            color: var(--text-secondary);
            background: var(--bg-card);
        }

        .status-box {
            display: none;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 14px;
        }

        .status-box.error {
            display: block;
            background: rgba(239, 68, 68, .14);
            border: 1px solid rgba(239, 68, 68, .25);
        }

        @media (max-width: 860px) {
            body {
                padding: 16px;
            }

            .library-header,
            .library-card {
                grid-template-columns: 1fr;
            }

            .library-header {
                flex-direction: column;
            }

            .library-toolbar,
            .library-stats {
                grid-template-columns: 1fr;
            }

            .library-card-actions {
                flex-direction: row;
                justify-content: flex-start;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <main class="library-page">
        <div id="app-navigation"></div>

        <section class="card" id="authSection" style="max-width: 480px; margin: 60px auto; display: none;">
            <h2>Вход в библиотеку</h2>
            <p class="text-secondary">Авторизуйтесь, чтобы увидеть свои и купленные квизы.</p>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="input" id="loginEmail" value="test@test.com">
            </div>
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" class="input" id="loginPassword" value="123456">
            </div>
            <div class="form-group">
                <label class="form-label">Имя для регистрации</label>
                <input type="text" class="input" id="loginName" placeholder="Ваше имя">
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" onclick="handleLogin()">Войти</button>
                <button class="btn btn-outline" onclick="handleRegister()">Регистрация</button>
            </div>
        </section>

        <section id="librarySection" style="display: none;">
            <header class="library-header">
                <div>
                    <div class="page-kicker">Библиотека</div>
                    <h1>Мои квизы</h1>
                    <p class="text-secondary">Здесь собраны созданные вами квизы, копии из каталога и купленные материалы из маркетплейса.</p>
                </div>
                <div class="library-actions">
                    <a class="btn btn-primary" href="/constructor.html">Новый квиз</a>
                    <a class="btn btn-outline" href="/marketplace.html">Маркетплейс</a>
                </div>
            </header>

            <div id="libraryStatus" class="status-box"></div>

            <section class="library-stats">
                <div class="library-stat">
                    <span class="text-secondary">Всего в библиотеке</span>
                    <strong id="libraryTotalCount">0</strong>
                </div>
                <div class="library-stat">
                    <span class="text-secondary">Редактируемые</span>
                    <strong id="libraryOwnedCount">0</strong>
                </div>
                <div class="library-stat">
                    <span class="text-secondary">Купленные</span>
                    <strong id="libraryPurchasedCount">0</strong>
                </div>
            </section>

            <section class="library-toolbar">
                <div>
                    <label class="form-label">Поиск</label>
                    <input id="librarySearch" class="input" placeholder="Название, описание, автор">
                </div>
                <div>
                    <label class="form-label">Источник</label>
                    <select id="librarySource" class="input">
                        <option value="">Все квизы</option>
                        <option value="OWNED">Мои и копии</option>
                        <option value="PURCHASED">Купленные</option>
                    </select>
                </div>
                <button class="btn btn-outline" onclick="loadQuizLibrary()">Обновить</button>
            </section>

            <section id="libraryList" class="library-list">
                <div class="library-empty">Загрузка библиотеки...</div>
            </section>
        </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components/nav.js"></script>
    <script src="/js/my-quizzes.js"></script>
</body>
</html>
