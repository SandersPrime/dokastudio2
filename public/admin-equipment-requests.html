<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DokaLab Admin — заявки</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { font-family: Manrope, var(--font-primary); background: linear-gradient(135deg, #f4f8f2, #fff8ed); }
        h1, h2, h3 { font-family: Unbounded, var(--font-display); }
        .admin-hero { padding: 34px 0 22px; display: flex; justify-content: space-between; gap: 20px; align-items: end; }
        .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; }
        .requests-list { display: grid; gap: 16px; margin-bottom: 50px; }
        .request-card { background: white; border: 1px solid var(--border-light); border-radius: 24px; padding: 24px; box-shadow: var(--shadow-sm); }
        .equipment-specs, .request-admin-row { display: flex; flex-wrap: wrap; gap: 10px; margin: 14px 0; }
        .equipment-specs span { background: var(--bg-secondary); border-radius: 999px; padding: 8px 14px; }
        .request-admin-row select { max-width: 220px; }
        .request-admin-row textarea { flex: 1 1 320px; min-height: 52px; }
        .equipment-status { min-height: 24px; color: var(--text-secondary); margin-bottom: 14px; }
        .equipment-status-success { color: var(--success); } .equipment-status-error { color: var(--danger); }
    </style>
</head>
<body>
    <div class="container" id="adminEquipmentRequestsPage">
        <div id="app-navigation"></div>
        <header class="admin-hero">
            <div>
                <span class="badge badge-primary">Admin</span>
                <h1>Заявки DokaLab</h1>
                <p>Обработка заявок на покупку, аренду и пакетные подборы.</p>
            </div>
            <a class="btn btn-secondary" href="/admin-equipment.html">Товары</a>
        </header>
        <div class="toolbar card">
            <label for="requestStatusFilter">Статус</label>
            <select class="input" id="requestStatusFilter">
                <option value="">Все</option>
                <option value="NEW">NEW</option>
                <option value="IN_PROGRESS">IN_PROGRESS</option>
                <option value="APPROVED">APPROVED</option>
                <option value="REJECTED">REJECTED</option>
                <option value="COMPLETED">COMPLETED</option>
            </select>
        </div>
        <div id="adminRequestsStatus" class="equipment-status"></div>
        <section id="equipmentRequestsList" class="requests-list"></section>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components/nav.js"></script>
    <script src="/js/equipment.js"></script>
    <script>if (window.Navigation) Navigation.render('app-navigation', { currentPage: 'admin-equipment-requests' });</script>
</body>
</html>
