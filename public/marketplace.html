<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DokaStudio — Marketplace</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { padding: 24px; }
        .market-page { max-width: 1280px; margin: 0 auto; }
        .market-toolbar { display: grid; grid-template-columns: 2fr repeat(4, 1fr) auto; gap: 10px; align-items: end; }
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
        .market-card { border: 1px solid rgba(255,255,255,.08); border-radius: 12px; overflow: hidden; background: rgba(255,255,255,.035); padding: 16px; }
        .market-cover { min-height: 150px; margin: -16px -16px 14px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(34,197,94,.22), rgba(14,165,233,.18)); }
        .market-cover img { width: 100%; height: 160px; object-fit: cover; }
        .market-tags, .market-row, .market-actions { display: flex; gap: 10px; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .market-tags { justify-content: flex-start; font-size: 12px; opacity: .78; }
        .status-box { display: none; padding: 12px 14px; border-radius: 12px; margin: 12px 0; }
        .status-box.success { background: rgba(34,197,94,.14); border: 1px solid rgba(34,197,94,.25); }
        .status-box.error { background: rgba(239,68,68,.14); border: 1px solid rgba(239,68,68,.25); }
        .empty-state { padding: 24px; opacity: .72; }
        @media (max-width: 960px) { .market-toolbar { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<main class="market-page">
    <div class="d-flex justify-between items-center">
        <div>
            <h1>Marketplace</h1>
            <p class="text-secondary">Покупайте платные квизы и добавляйте бесплатные шаблоны.</p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline" href="/author-dashboard.html">Автору</a>
            <a class="btn btn-outline" href="/">На главную</a>
        </div>
    </div>
    <div id="marketStatus" class="status-box"></div>
    <section class="card">
        <div class="market-toolbar">
            <input id="marketSearch" class="input" placeholder="Поиск">
            <input id="marketCategory" class="input" placeholder="Категория">
            <input id="marketAgeGroup" class="input" placeholder="Возраст">
            <input id="marketFormat" class="input" placeholder="Формат">
            <select id="marketIsPaid" class="input">
                <option value="">Любые</option>
                <option value="true">Платные</option>
                <option value="false">Бесплатные</option>
            </select>
            <button class="btn btn-primary" onclick="loadMarketplace()">Найти</button>
        </div>
    </section>
    <section id="marketGrid" class="market-grid mt-4">
        <div class="empty-state">Загрузка...</div>
    </section>
</main>
<script src="/js/api.js"></script>
<script src="/js/marketplace.js"></script>
</body>
</html>
